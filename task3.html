<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Calculator App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0c1e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        
        .calculator {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            width: 280px;
        }
        
        #display {
            width: 100%;
            height: 60px;
            font-size: 1.8rem;
            margin-bottom: 15px;
            text-align: right;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        button {
            padding: 15px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .num {
            background: #1e1b2e;
            color: white;
        }
        
        .op {
            background: #4f8ef7;
            color: white;
        }
        
        .equal {
            background: #00e5c8;
            color: black;
        }
        
        .clear {
            background: red;
            color: white;
        }
        
        button:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <input type="text" id="display" disabled>

        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="op" onclick="append('/')">/</button>
            <button class="op" onclick="append('*')">*</button>
            <button class="op" onclick="append('-')">-</button>

            <button class="num" onclick="append('7')">7</button>
            <button class="num" onclick="append('8')">8</button>
            <button class="num" onclick="append('9')">9</button>
            <button class="op" onclick="append('+')">+</button>

            <button class="num" onclick="append('4')">4</button>
            <button class="num" onclick="append('5')">5</button>
            <button class="num" onclick="append('6')">6</button>
            <button class="equal" onclick="calculate()">=</button>

            <button class="num" onclick="append('1')">1</button>
            <button class="num" onclick="append('2')">2</button>
            <button class="num" onclick="append('3')">3</button>
            <button class="num" onclick="append('0')">0</button>
        </div>
    </div>

    <script>
        let display = document.getElementById("display");

        function append(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function calculate() {
            try {
                display.value = eval(display.value);
            } catch {
                display.value = "Error";
            }
        }

        // Keyboard support
        document.addEventListener("keydown", (e) => {
            if (!isNaN(e.key) || "+-*/.".includes(e.key)) {
                append(e.key);
            } else if (e.key === "Enter") {
                calculate();
            } else if (e.key === "Backspace") {
                display.value = display.value.slice(0, -1);
            } else if (e.key === "Escape") {
                clearDisplay();
            }
        });
    </script>

</body>

</html>
